<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Guia do Sicario ao Executor</title>
    <meta name="description" content="Guia de Katar para Sicario/Executor no Ragnarok Online.">
    <meta property="og:title" content="Guia do Sicario ao Executor">
    <meta property="og:description" content="Guia de Katar para Sicario/Executor no Ragnarok Online.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="Guia_do_Sicario_ao_Executor_assets/thumb.png">
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #171a21;
        --muted: #5f6673;
        --line: #d9dee8;
        --line-strong: #bac3d4;
        --accent: #c62828;
        --accent-2: #275dad;
        --soft: #f8e8e8;
        --code-bg: #edf1f7;
        --shadow: 0 18px 50px rgba(22, 28, 45, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.68;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(180deg, rgba(198, 40, 40, 0.08), transparent 320px),
          linear-gradient(90deg, rgba(39, 93, 173, 0.08), transparent 520px);
      }

      .page {
        width: min(1160px, calc(100% - 32px));
        margin: 28px auto;
      }

      .guide {
        overflow: hidden;
        padding: clamp(22px, 4vw, 52px);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .loading,
      .error {
        min-height: 260px;
        display: grid;
        place-items: center;
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: var(--accent);
      }

      h1,
      h2,
      h3,
      h4 {
        line-height: 1.18;
        letter-spacing: 0;
      }

      h1 {
        margin: 0 0 20px;
        font-size: clamp(2rem, 5vw, 3.65rem);
      }

      h2 {
        margin: 52px 0 18px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--line-strong);
        font-size: clamp(1.55rem, 3vw, 2.2rem);
      }

      h3 {
        margin: 34px 0 12px;
        font-size: clamp(1.2rem, 2.4vw, 1.55rem);
      }

      h4 {
        margin: 24px 0 10px;
        font-size: 1.05rem;
      }

      p,
      ul,
      ol {
        margin-top: 0;
      }

      a {
        color: var(--accent-2);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      a:hover {
        color: var(--accent);
      }

      img {
        max-width: 100%;
        height: auto;
      }

      p[align="center"] {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      p[align="center"] img {
        flex: 0 0 auto;
      }

      table {
        display: block;
        width: 100%;
        overflow-x: auto;
        margin: 22px 0;
        border-collapse: collapse;
        border-spacing: 0;
      }

      th,
      td {
        min-width: 142px;
        padding: 11px 13px;
        border: 1px solid var(--line);
        vertical-align: top;
      }

      th {
        background: var(--soft);
        color: #2a1515;
        text-align: left;
        font-weight: 700;
      }

      tr:nth-child(even) td {
        background: #fbfcff;
      }

      code {
        padding: 0.16em 0.36em;
        border-radius: 4px;
        background: var(--code-bg);
        color: #1e355c;
        font-size: 0.94em;
      }

      pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 8px;
        background: #141922;
        color: #f7f9fc;
      }

      pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      blockquote {
        margin-left: 0;
        padding: 10px 18px;
        border-left: 4px solid var(--accent);
        background: var(--soft);
        color: var(--muted);
      }

      hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 36px 0;
      }

      @media (max-width: 720px) {
        .page {
          width: 100%;
          margin: 0;
        }

        .guide {
          border-width: 0;
          border-radius: 0;
          box-shadow: none;
        }

        th,
        td {
          min-width: 132px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <article id="guide" class="guide">
        <div class="loading">Carregando guia...</div>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const guide = document.getElementById("guide");

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      async function renderGuide() {
        try {
          const response = await fetch("README.md", { cache: "no-cache" });

          if (!response.ok) {
            throw new Error("README.md nao encontrado");
          }

          const markdown = await response.text();
          guide.innerHTML = window.marked
            ? marked.parse(markdown, { gfm: true, breaks: false })
            : `<pre><code>${escapeHtml(markdown)}</code></pre>`;

          guide.querySelectorAll("a[href^='http']").forEach((link) => {
            link.setAttribute("target", "_blank");
            link.setAttribute("rel", "noopener noreferrer");
          });
        } catch (error) {
          guide.innerHTML = `<div class="error">Nao foi possivel carregar o guia.</div>`;
          console.error(error);
        }
      }

      renderGuide();
    </script>
  </body>
</html>
