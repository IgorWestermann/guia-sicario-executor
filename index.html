<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Guia do Sicario ao Executor</title>
    <meta name="description" content="Guia de Katar para Sicario/Executor no Ragnarok Online.">
    <meta property="og:title" content="Guia do Sicario ao Executor">
    <meta property="og:description" content="Guia de Katar para Sicario/Executor no Ragnarok Online.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="Guia_do_Sicario_ao_Executor_assets/thumb.png">
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --ink: #171a21;
        --muted: #5f6673;
        --line: #d9dee8;
        --line-strong: #bac3d4;
        --accent: #c62828;
        --accent-2: #275dad;
        --soft: #f8e8e8;
        --code-bg: #edf1f7;
        --shadow: 0 18px 50px rgba(22, 28, 45, 0.12);
        --guide-padding: clamp(22px, 4vw, 52px);
        --toc-width: 280px;
      }

      * {
        box-sizing: border-box;
      }

      [hidden] {
        display: none !important;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.68;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        z-index: -1;
        background:
          linear-gradient(180deg, rgba(198, 40, 40, 0.08), transparent 320px),
          linear-gradient(90deg, rgba(39, 93, 173, 0.08), transparent 520px);
      }

      .page {
        width: min(1160px, calc(100% - 32px));
        margin: 28px auto;
      }

      .toc-panel {
        position: fixed;
        top: 28px;
        bottom: 28px;
        left: max(18px, calc((100vw - 1768px) / 2));
        z-index: 10;
        width: var(--toc-width);
        overflow-y: auto;
        padding: 16px;
        background: rgba(255, 255, 255, 0.96);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 16px 42px rgba(22, 28, 45, 0.12);
      }

      .toc-title {
        margin-bottom: 10px;
        color: var(--ink);
        font-size: 0.86rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .toc-links {
        display: grid;
        gap: 2px;
      }

      .toc-link {
        display: block;
        padding: 7px 9px;
        border-radius: 6px;
        color: var(--muted);
        font-size: 0.92rem;
        line-height: 1.3;
        text-decoration: none;
      }

      .toc-link:hover,
      .toc-link.is-active {
        background: var(--soft);
        color: var(--accent);
      }

      .toc-link-depth-3 {
        padding-left: 22px;
        font-size: 0.86rem;
      }

      .toc-toggle,
      .toc-backdrop {
        display: none;
      }

      .guide {
        overflow: hidden;
        padding: var(--guide-padding);
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .loading,
      .error {
        min-height: 260px;
        display: grid;
        place-items: center;
        color: var(--muted);
        text-align: center;
      }

      .error {
        color: var(--accent);
      }

      h1,
      h2,
      h3,
      h4 {
        line-height: 1.18;
        letter-spacing: 0;
      }

      h1 {
        margin: 0 0 20px;
        font-size: clamp(2rem, 5vw, 3.65rem);
      }

      h2 {
        margin: 52px 0 18px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--line-strong);
        font-size: clamp(1.55rem, 3vw, 2.2rem);
      }

      h3 {
        margin: 34px 0 12px;
        font-size: clamp(1.2rem, 2.4vw, 1.55rem);
      }

      h4 {
        margin: 24px 0 10px;
        font-size: 1.05rem;
      }

      p,
      ul,
      ol {
        margin-top: 0;
      }

      a {
        color: var(--accent-2);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.18em;
      }

      a:hover {
        color: var(--accent);
      }

      img {
        max-width: 100%;
        height: auto;
      }

      .guide > p:first-child {
        margin: calc(var(--guide-padding) * -1) calc(var(--guide-padding) * -1) 28px;
      }

      .guide > p:first-child img {
        display: block;
        width: 100%;
        max-width: none;
      }

      p[align="center"] {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      p[align="center"] img {
        flex: 0 0 auto;
      }

      table {
        display: block;
        width: 100%;
        overflow-x: auto;
        margin: 22px 0;
        border-collapse: collapse;
        border-spacing: 0;
      }

      th,
      td {
        min-width: 142px;
        padding: 11px 13px;
        border: 1px solid var(--line);
        vertical-align: top;
      }

      th {
        background: var(--soft);
        color: #2a1515;
        text-align: left;
        font-weight: 700;
      }

      tr:nth-child(even) td {
        background: #fbfcff;
      }

      code {
        padding: 0.16em 0.36em;
        border-radius: 4px;
        background: var(--code-bg);
        color: #1e355c;
        font-size: 0.94em;
      }

      pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 8px;
        background: #141922;
        color: #f7f9fc;
      }

      pre code {
        padding: 0;
        background: transparent;
        color: inherit;
      }

      blockquote {
        margin-left: 0;
        padding: 10px 18px;
        border-left: 4px solid var(--accent);
        background: var(--soft);
        color: var(--muted);
      }

      hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 36px 0;
      }

      @media (max-width: 1791px) {
        .toc-panel {
          top: 0;
          bottom: 0;
          left: 0;
          z-index: 40;
          width: min(340px, calc(100vw - 48px));
          border-top-left-radius: 0;
          border-bottom-left-radius: 0;
          transform: translateX(calc(-100% - 18px));
          transition: transform 180ms ease;
        }

        .toc-panel.is-open {
          transform: translateX(0);
        }

        .toc-toggle {
          position: fixed;
          right: 18px;
          bottom: 18px;
          z-index: 50;
          display: inline-flex;
          align-items: center;
          gap: 8px;
          min-height: 44px;
          padding: 0 14px;
          border: 1px solid rgba(255, 255, 255, 0.34);
          border-radius: 999px;
          background: #171a21;
          color: #ffffff;
          box-shadow: 0 16px 34px rgba(22, 28, 45, 0.24);
          cursor: pointer;
          font: inherit;
          font-weight: 700;
        }

        .toc-backdrop:not([hidden]) {
          position: fixed;
          inset: 0;
          z-index: 30;
          display: block;
          background: rgba(23, 26, 33, 0.36);
        }
      }

      @media (max-width: 720px) {
        .page {
          width: 100%;
          margin: 0;
        }

        .guide {
          border-width: 0;
          border-radius: 0;
          box-shadow: none;
        }

        th,
        td {
          min-width: 132px;
        }
      }
    </style>
  </head>
  <body>
    <button id="tocToggle" class="toc-toggle" type="button" aria-controls="tocPanel" aria-expanded="false" hidden>Índice</button>
    <div id="tocBackdrop" class="toc-backdrop" hidden></div>
    <aside id="tocPanel" class="toc-panel" aria-label="Índice do guia" hidden>
      <div class="toc-title">Índice</div>
      <nav id="tocLinks" class="toc-links"></nav>
    </aside>

    <main class="page">
      <article id="guide" class="guide">
        <div class="loading">Carregando guia...</div>
      </article>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
      const guide = document.getElementById("guide");
      const tocPanel = document.getElementById("tocPanel");
      const tocLinks = document.getElementById("tocLinks");
      const tocToggle = document.getElementById("tocToggle");
      const tocBackdrop = document.getElementById("tocBackdrop");

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      async function loadMarkdown() {
        const sources = ["README.md", "guia.md"];

        for (const source of sources) {
          const response = await fetch(source, { cache: "no-cache" });

          if (response.ok) {
            return response.text();
          }
        }

        throw new Error("Nenhum arquivo de guia foi encontrado.");
      }

      function slugify(value) {
        return value
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "")
          .toLowerCase()
          .replace(/[^a-z0-9\s-]/g, "")
          .trim()
          .replace(/\s+/g, "-")
          .replace(/-+/g, "-") || "secao";
      }

      function openToc() {
        tocPanel.classList.add("is-open");
        tocToggle.setAttribute("aria-expanded", "true");
        tocBackdrop.hidden = false;
      }

      function closeToc() {
        tocPanel.classList.remove("is-open");
        tocToggle.setAttribute("aria-expanded", "false");
        tocBackdrop.hidden = true;
      }

      function buildToc() {
        const headings = [...guide.querySelectorAll("h2, h3")]
          .filter((heading) => heading.textContent.trim());
        const usedIds = new Map();

        tocLinks.innerHTML = "";

        if (!headings.length) {
          tocPanel.hidden = true;
          tocToggle.hidden = true;
          return;
        }

        tocPanel.hidden = false;
        tocToggle.hidden = false;

        headings.forEach((heading) => {
          const baseId = slugify(heading.textContent);
          const count = usedIds.get(baseId) || 0;
          const id = count ? `${baseId}-${count + 1}` : baseId;
          usedIds.set(baseId, count + 1);
          heading.id = id;

          const link = document.createElement("a");
          link.href = `#${id}`;
          link.textContent = heading.textContent;
          link.className = `toc-link toc-link-depth-${heading.tagName === "H3" ? "3" : "2"}`;
          link.addEventListener("click", closeToc);
          tocLinks.appendChild(link);
        });

        const links = [...tocLinks.querySelectorAll("a")];
        const setActive = (id) => {
          links.forEach((link) => {
            link.classList.toggle("is-active", link.hash === `#${id}`);
          });
        };

        setActive(headings[0].id);

        if ("IntersectionObserver" in window) {
          const observer = new IntersectionObserver((entries) => {
            entries
              .filter((entry) => entry.isIntersecting)
              .forEach((entry) => setActive(entry.target.id));
          }, {
            rootMargin: "0px 0px -72% 0px",
            threshold: 0.01
          });

          headings.forEach((heading) => observer.observe(heading));
        }
      }

      async function renderGuide() {
        try {
          const markdown = await loadMarkdown();
          guide.innerHTML = window.marked
            ? marked.parse(markdown, { gfm: true, breaks: false })
            : `<pre><code>${escapeHtml(markdown)}</code></pre>`;

          guide.querySelectorAll("a[href^='http']").forEach((link) => {
            link.setAttribute("target", "_blank");
            link.setAttribute("rel", "noopener noreferrer");
          });

          buildToc();
        } catch (error) {
          guide.innerHTML = `<div class="error">Nao foi possivel carregar o guia.</div>`;
          console.error(error);
        }
      }

      tocToggle.addEventListener("click", () => {
        tocPanel.classList.contains("is-open") ? closeToc() : openToc();
      });
      tocBackdrop.addEventListener("click", closeToc);
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeToc();
        }
      });

      renderGuide();
    </script>
  </body>
</html>
