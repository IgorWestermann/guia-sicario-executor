<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f2ea;
        --paper: #fffdf9;
        --ink: #211f1c;
        --muted: #625b52;
        --line: #d8cfc2;
        --accent: #b42318;
        --accent-soft: #fff0ec;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        line-height: 1.65;
      }

      .guide {
        width: min(1120px, calc(100% - 32px));
        margin: 32px auto;
        padding: clamp(20px, 4vw, 48px);
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 8px;
      }

      h1, h2, h3, h4 {
        line-height: 1.2;
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 5vw, 3.5rem);
      }

      h2 {
        margin-top: 48px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--line);
      }

      h3 {
        margin-top: 32px;
      }

      a {
        color: var(--accent);
        text-decoration-thickness: 0.08em;
        text-underline-offset: 0.16em;
      }

      img {
        max-width: 100%;
        height: auto;
      }

      table {
        display: block;
        width: 100%;
        overflow-x: auto;
        border-collapse: collapse;
        margin: 20px 0;
      }

      th, td {
        min-width: 140px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        vertical-align: top;
      }

      th {
        background: var(--accent-soft);
        text-align: left;
      }

      code {
        padding: 0.15em 0.35em;
        border-radius: 4px;
        background: #eee5d8;
      }

      pre {
        overflow-x: auto;
        padding: 16px;
        border-radius: 8px;
        background: #211f1c;
        color: #fffdf9;
      }

      pre code {
        padding: 0;
        background: transparent;
      }

      blockquote {
        margin-left: 0;
        padding: 8px 18px;
        border-left: 4px solid var(--accent);
        color: var(--muted);
        background: var(--accent-soft);
      }

      hr {
        border: 0;
        border-top: 1px solid var(--line);
        margin: 32px 0;
      }

      @media (max-width: 720px) {
        .guide {
          width: 100%;
          margin: 0;
          border-width: 0;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <main class="guide">
      {{ content }}
    </main>
  </body>
</html>
